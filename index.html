<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./main.css">
    <script src="./script.js" defer></script>
    <title>Tik Tok Toe</title>
</head>
<body>
    <header>
        <div class="inner-header">
            <div class="title-container">
                <h1 id="page-title">TikTokToe</h1>
                <h4 id="page-subtitle">by Liam Morrison</h4>
            </div>
            <button id="reset-button">Reset Game</button>
        </div>
    </header>
    <main>
        <div id="gameboard">
            <div id="0" class="grid-cell"></div>
            <div id="1" class="grid-cell"></div>
            <div id="2" class="grid-cell"></div>
            <div id="3" class="grid-cell"></div>
            <div id="4" class="grid-cell"></div>
            <div id="5" class="grid-cell"></div>
            <div id="6" class="grid-cell"></div>
            <div id="7" class="grid-cell"></div>
            <div id="8" class="grid-cell"></div>
        </div>
        <div>
            <h1 id="message-box"></h1>
        </div>
    </main>
    <footer>
        <div class="inner-footer"><h3>Copyright © 2023 liammtech</h3></div>
    </footer>
</body>
</html>
